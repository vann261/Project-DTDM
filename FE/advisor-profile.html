<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile cố vấn</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ... (Giữ nguyên phần CSS của bạn vì nó đã đẹp rồi) ... */
* { box-sizing: border-box; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(180deg, #eef6ff, #f8fbff); margin: 0; color: #1e3a8a; }
.hero { background: linear-gradient(135deg, #3b82f6, #2563eb 55%, #1d4ed8); color: white; padding: 54px 10% 42px; position: relative; overflow: hidden; }
.hero-back { position: relative; z-index: 1; display: inline-flex; align-items: center; gap: 8px; color: #dbeafe; text-decoration: none; font-size: 14px; margin-bottom: 14px; }
.hero h1 { position: relative; z-index: 1; margin: 0; font-size: clamp(30px, 4vw, 46px); font-weight: 800; letter-spacing: -0.03em; }
.hero p { position: relative; z-index: 1; margin: 10px 0 0; max-width: 760px; font-size: 15px; line-height: 1.7; color: #e8f1ff; }
.profile-wrap { width: min(1100px, 82%); margin: -26px auto 52px; position: relative; z-index: 2; }
.profile { background: white; border-radius: 28px; padding: 34px; box-shadow: 0 20px 45px rgba(37, 99, 235, 0.12); border: 1px solid #e6f0ff; animation: fadeUp 0.7s ease; min-height: 300px; }
.top { display: flex; gap: 28px; align-items: center; padding-bottom: 26px; border-bottom: 1px solid #edf3ff; }
.top img { width: 148px; height: 148px; border-radius: 50%; border: 5px solid #dbeafe; object-fit: cover; background: #f8fbff; }
.name { font-size: 31px; font-weight: 800; color: #1e3a8a; line-height: 1.3; }
.tag { background: #e0edff; color: #2563eb; padding: 7px 16px; border-radius: 999px; display: inline-block; margin-top: 10px; font-size: 13px; font-weight: 700; }
.stats { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 18px; }
.stat { background: #f1f7ff; padding: 11px 15px; border-radius: 14px; font-size: 13px; font-weight: 600; border: 1px solid #dbeafe; color: #1e3a8a; }
.content-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 26px; margin-top: 28px; }
.section { background: #fcfdff; border: 1px solid #edf3ff; border-radius: 22px; padding: 22px; }
.section h3 { margin: 0 0 12px; color: #1e40af; font-size: 18px; }
.text { color: #475569; line-height: 1.8; font-size: 14px; }
.skills-list { display: flex; flex-wrap: wrap; gap: 8px; }
.skill-tag { background: #e0edff; color: #2563eb; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 1px solid #dbeafe; }
.action-box { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
.btn { text-decoration: none; border: none; border-radius: 14px; padding: 12px 18px; font-size: 14px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: 0.25s; }
.btn-primary { background: linear-gradient(90deg, #3b82f6, #2563eb); color: white; }
.btn-outline { background: white; color: #2563eb; border: 1.5px solid #3b82f6; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; } .top { flex-direction: column; text-align: center; } .stats { justify-content: center; } }
</style>
</head>

<body>

<div id="site-header"></div>

<section class="hero">
    <a href="covan.html" class="hero-back">← Quay lại danh sách cố vấn</a>
    <h1>Hồ sơ cố vấn học tập</h1>
    <p>Chi tiết chuyên môn và kinh nghiệm của cố vấn.</p>
</section>

<div class="profile-wrap">
    <div class="profile" id="profile">
        <p style="text-align:center;">Đang tải dữ liệu...</p>
    </div>
</div>

<div id="site-footer"></div>
<script src="components.js"></script>

<script>
// 1. Lấy ID từ URL
const urlParams = new URLSearchParams(window.location.search);
const advisorId = urlParams.get('id');

async function loadProfile() {
    if (!advisorId) {
        document.getElementById("profile").innerHTML = "<p>Không tìm thấy mã cố vấn!</p>";
        return;
    }

    try {
        const res = await fetch(`../BE/get_advisors.php?action=detail&id=${advisorId}`);
        const p = await res.json();
        
        if(!p || p.error) {
            document.getElementById("profile").innerHTML = "<p>Cố vấn không tồn tại!</p>";
            return;
        }

        // Xử lý biến kỹ năng: Nếu là chuỗi thì cắt thành mảng, nếu đã là mảng thì giữ nguyên
        let skillsArray = [];
        if (typeof p.skills === 'string') {
            skillsArray = p.skills.split(',').map(s => s.trim());
        } else if (Array.isArray(p.skills)) {
            skillsArray = p.skills;
        }

        document.getElementById("profile").innerHTML = `
            <div class="top">
                <img src="${p.avatar_url}" alt="${p.full_name}">
                <div>
                    <div class="name">${p.full_name}</div>
                    <div class="tag">${p.tag}</div>
                    <div class="stats">
                        <div class="stat">⭐ ${p.rating}</div>
                        <div class="stat">👥 ${p.student_count} SV</div>
                        <div class="stat">📚 ${p.experience}</div>
                    </div>
                    <div class="action-box">
                        <a href="schedule.html?id=${p.user_id}" class="btn btn-primary">Xem lịch & Đặt chỗ</a>
                        <a href="covan.html" class="btn btn-outline">Quay lại</a>
                    </div>
                </div>
            </div>
            <div class="content-grid">
                <div class="section">
                    <h3>📖 Giới thiệu</h3>
                    <div class="text">${p.description}</div>
                </div>
                <div class="section">
                    <h3>🛠️ Kỹ năng chuyên môn</h3>
                    <div class="skills-list">
                        ${skillsArray.length > 0 
                            ? skillsArray.map(s => `<span class="skill-tag">${s}</span>`).join('') 
                            : '<span class="text">Chưa cập nhật kỹ năng</span>'}
                    </div>
                </div>
            </div>`;
    } catch (err) {
        console.error(err);
        document.getElementById("profile").innerHTML = "<p>Lỗi kết nối máy chủ!</p>";
    }
}

document.addEventListener('DOMContentLoaded', loadProfile);
</script>

</body>
</html>
