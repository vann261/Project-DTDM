<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile cố vấn</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

    body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(180deg, #eef6ff, #f8fbff);
    margin: 0;
    color: #1e3a8a;
}

/* HERO */
.hero {
    background: linear-gradient(135deg, #3b82f6, #2563eb 55%, #1d4ed8);
    color: white;
    padding: 54px 10% 42px;
    position: relative;
    overflow: hidden;
}

.hero::before,
.hero::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(45px);
    opacity: 0.22;
}

.hero::before {
    width: 240px;
    height: 240px;
    background: #93c5fd;
    top: -70px;
    right: 110px;
}

.hero::after {
    width: 200px;
    height: 200px;
    background: #dbeafe;
    bottom: -60px;
    left: 8%;
}

.hero-back {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #dbeafe;
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 14px;
}

.hero-back:hover {
    color: white;
}

.hero h1 {
    position: relative;
    z-index: 1;
    margin: 0;
    font-size: clamp(30px, 4vw, 46px);
    font-weight: 800;
    letter-spacing: -0.03em;
}

.hero p {
    position: relative;
    z-index: 1;
    margin: 10px 0 0;
    max-width: 760px;
    font-size: 15px;
    line-height: 1.7;
    color: #e8f1ff;
}

/* PROFILE */
.profile-wrap {
    width: min(1100px, 82%);
    margin: -26px auto 52px;
    position: relative;
    z-index: 2;
}

.profile {
    background: white;
    border-radius: 28px;
    padding: 34px;
    box-shadow: 0 20px 45px rgba(37, 99, 235, 0.12);
    border: 1px solid #e6f0ff;
    animation: fadeUp 0.7s ease;
}

/* TOP */
.top {
    display: flex;
    gap: 28px;
    align-items: center;
    padding-bottom: 26px;
    border-bottom: 1px solid #edf3ff;
}

.top img {
    width: 148px;
    height: 148px;
    border-radius: 50%;
    border: 5px solid #dbeafe;
    object-fit: cover;
    transition: 0.3s ease;
    background: #f8fbff;
}

.top img:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 28px rgba(59,130,246,0.22);
}

/* META */
.name {
    font-size: 31px;
    font-weight: 800;
    color: #1e3a8a;
    line-height: 1.3;
}

.tag {
    background: #e0edff;
    color: #2563eb;
    padding: 7px 16px;
    border-radius: 999px;
    display: inline-block;
    margin-top: 10px;
    font-size: 13px;
    font-weight: 700;
}

.stats {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 18px;
}

.stat {
    background: #f1f7ff;
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid #dbeafe;
    color: #1e3a8a;
}

/* CONTENT */
.content-grid {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 26px;
    margin-top: 28px;
}

.section {
    background: #fcfdff;
    border: 1px solid #edf3ff;
    border-radius: 22px;
    padding: 22px;
}

.section h3 {
    margin: 0 0 12px;
    color: #1e40af;
    font-size: 18px;
}

.text {
    color: #475569;
    line-height: 1.8;
    font-size: 14px;
}

/* SKILLS */
.skills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.skill {
    background: #e0edff;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    color: #1e40af;
}

/* ACTION BOX */
.action-box {
    margin-top: 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.btn {
    text-decoration: none;
    border: none;
    border-radius: 14px;
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.25s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.btn-primary {
    background: linear-gradient(90deg, #3b82f6, #2563eb);
    color: white;
    box-shadow: 0 8px 20px rgba(59,130,246,0.22);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(59,130,246,0.28);
}

.btn-outline {
    background: white;
    color: #2563eb;
    border: 1.5px solid #3b82f6;
}

.btn-outline:hover {
    background: #eff6ff;
}

/* ACTIVE NAV */
.site-header__nav a[data-page="covan"] {
    background: rgba(255,255,255,0.14);
    border-radius: 12px;
    padding: 8px 14px;
}

/* ANIMATION */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(28px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* RESPONSIVE */
@media (max-width: 900px) {
    .content-grid {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 768px) {
    body {
        padding-top: 76px;
    }

    .hero {
        padding: 42px 5% 34px;
    }

    .profile-wrap {
        width: 92%;
    }

    .profile {
        padding: 22px;
        border-radius: 22px;
    }

    .top {
        flex-direction: column;
        text-align: center;
    }

    .stats {
        justify-content: center;
    }

    .name {
        font-size: 26px;
    }
}
</style>
</head>

<body>

<div class="profile-wrap">

</div>

</body>
</html>
