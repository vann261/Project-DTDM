<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(180deg, #eef6ff, #f8fbff);
    margin: 0;
    color: #1e3a8a;
}

/* HERO */
.hero {
    background: linear-gradient(135deg, #3b82f6, #2563eb 55%, #1d4ed8);
    color: white;
    padding: 54px 10% 42px;
    position: relative;
    overflow: hidden;
}

.hero::before,
.hero::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(45px);
    opacity: 0.22;
    pointer-events: none;
}

.hero::before {
    width: 240px;
    height: 240px;
    background: #93c5fd;
    top: -70px;
    right: 110px;
}

.hero::after {
    width: 200px;
    height: 200px;
    background: #dbeafe;
    bottom: -60px;
    left: 8%;
}

.hero-back {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #dbeafe;
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 14px;
}

.hero-back:hover {
    color: white;
}

.hero h1 {
    position: relative;
    z-index: 1;
    margin: 0;
    font-size: clamp(30px, 4vw, 46px);
    font-weight: 800;
    letter-spacing: -0.03em;
}

.hero p {
    position: relative;
    z-index: 1;
    margin: 10px 0 0;
    max-width: 760px;
    font-size: 15px;
    line-height: 1.7;
    color: #e8f1ff;
}

/* WRAP */
.page-wrap {
    width: min(1100px, 82%);
    margin: -26px auto 52px;
    position: relative;
    z-index: 2;
}

/* PROFILE CARD */
.profile-card {
    background: white;
    border-radius: 28px;
    padding: 28px;
    box-shadow: 0 20px 45px rgba(37, 99, 235, 0.12);
    border: 1px solid #e6f0ff;
    animation: fadeUp 0.6s ease;
}

.profile {
    display: flex;
    align-items: center;
    gap: 18px;
    padding-bottom: 22px;
    border-bottom: 1px solid #edf3ff;
}

.profile img {
    width: 78px;
    height: 78px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #dbeafe;
}

.profile-meta {
    flex: 1;
}

.name {
    font-size: 22px;
    font-weight: 800;
    color: #1e3a8a;
    margin-bottom: 6px;
}

.profile-sub {
    color: #64748b;
    font-size: 14px;
    line-height: 1.6;
}

/* SCHEDULE BOX */
.box {
    margin-top: 24px;
    background: #fcfdff;
    border: 1px solid #edf3ff;
    padding: 24px;
    border-radius: 24px;
}

.date-title {
    margin-bottom: 16px;
    font-size: 15px;
    font-weight: 700;
    color: #1e3a8a;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}

.date-title input {
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid #cbd5e1;
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: #1e3a8a;
    background: #f8fafc;
    outline: none;
    transition: 0.25s;
}

.date-title input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 4px rgba(59,130,246,0.10);
}

/* SLOT */
#schedule-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.slot {
    display: grid;
    grid-template-columns: 1.1fr 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: white;
    border: 1px solid #e8f0ff;
    border-radius: 18px;
    transition: 0.25s ease;
}

.slot:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(37, 99, 235, 0.08);
}

.time {
    font-weight: 700;
    color: #1e3a8a;
}

.available {
    color: #16a34a;
    font-weight: 700;
}

.booked {
    color: #ef4444;
    font-weight: 700;
}

.pending {
    color: #94a3b8;
    font-weight: 600;
}

/* BUTTON */
.btn {
    padding: 10px 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, #3b82f6, #2563eb);
    color: white;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    transition: 0.25s ease;
}

.btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(59,130,246,0.22);
}

.btn:disabled {
    background: #cbd5e1;
    cursor: not-allowed;
    box-shadow: none;
}

.btn-outline {
    background: white;
    color: #2563eb;
    border: 1.5px solid #3b82f6;
}

.btn-outline:hover {
    background: #eff6ff;
}

.action-row {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: flex-end;
}

/* ACTIVE NAV */
.site-header__nav a[data-page="covan"] {
    background: rgba(255,255,255,0.14);
    border-radius: 12px;
    padding: 8px 14px;
}

/* ANIMATION */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(28px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .hero {
        padding: 42px 5% 34px;
    }

    .page-wrap {
        width: 92%;
    }

    .profile-card {
        padding: 20px;
        border-radius: 22px;
    }

    .profile {
        flex-direction: column;
        align-items: flex-start;
    }

    .slot {
        grid-template-columns: 1fr;
        align-items: flex-start;
    }

    .action-row {
        justify-content: stretch;
    }

    .action-row a,
    .action-row button {
        width: 100%;
    }
}
</style>
</head>

<body>

<div id="site-header"></div>

<section class="hero">
    <a href="covan.html" class="hero-back">← Quay lại danh sách cố vấn</a>
    <h1>Lịch trống cố vấn</h1>
    <p>Chọn ngày phù hợp để xem các khung giờ còn trống và tiến hành đặt lịch tư vấn nhanh trên hệ thống EduConsult.</p>
</section>

<div class="page-wrap">
    <div class="profile-card">
        <div class="profile">
            <img id="avatar" alt="Avatar cố vấn">
            <div class="profile-meta">
                <div class="name" id="name"></div>
                <div class="profile-sub">Xem lịch trống theo ngày và chọn khung giờ phù hợp để đặt lịch tư vấn.</div>
            </div>
        </div>

        <div class="box">
            <div class="date-title">
                📅 Chọn ngày:
                <input type="date" id="datePicker">
            </div>

            <div id="schedule-list"></div>

            <div class="action-row">
                <a href="covan.html"><button class="btn btn-outline">Quay lại</button></a>
            </div>
        </div>
    </div>
</div>

<div id="site-footer"></div>
<script src="components.js"></script>

<script>
const today = new Date().toISOString().split("T")[0];
document.getElementById("datePicker").setAttribute("min", today);

// DATA GIẢNG VIÊN
const advisors = {
    1: {name: "TS. Nguyễn Văn An", img: "https://i.pravatar.cc/100?img=1"},
    2: {name: "ThS. Trần Thị Bình", img: "https://i.pravatar.cc/100?img=2"},
    3: {name: "TS. Lê Minh Cường", img: "https://i.pravatar.cc/100?img=3"},
    4: {name: "ThS. Phạm Thu Hà", img: "https://i.pravatar.cc/100?img=4"},
    5: {name: "TS. Hoàng Văn Dũng", img: "https://i.pravatar.cc/100?img=5"},
    6: {name: "ThS. Vũ Thị Lan", img: "https://i.pravatar.cc/100?img=6"}
};

const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "1";

if (advisors[id]) {
    document.getElementById("name").innerText = advisors[id].name;
    document.getElementById("avatar").src = advisors[id].img;
}

// GIỜ CỐ ĐỊNH
const baseSlots = [
    "08:00 - 09:00",
    "09:00 - 10:00",
    "10:00 - 11:00",
    "14:00 - 15:00",
    "15:00 - 16:00"
];

function renderSchedule(selectedDate = null) {
    const list = document.getElementById("schedule-list");
    list.innerHTML = "";

    baseSlots.forEach(time => {
        const div = document.createElement("div");
        div.className = "slot";

        if (!selectedDate) {
            div.innerHTML = `
                <div class="time">${time}</div>
                <div class="pending">Chưa chọn ngày</div>
                <button class="btn" disabled>Chọn ngày</button>
            `;
        } else {
            const isAvailable = Math.random() > 0.5;

            div.innerHTML = `
                <div class="time">${time}</div>
                <div class="${isAvailable ? 'available' : 'booked'}">
                    ${isAvailable ? 'Còn trống' : 'Đã đặt'}
                </div>
                ${
                    isAvailable
                    ? `<a href="booking.html?id=${id}&time=${encodeURIComponent(time)}&date=${encodeURIComponent(selectedDate)}">
                            <button class="btn">Đặt lịch</button>
                       </a>`
                    : `<button class="btn" disabled>Đã đầy</button>`
                }
            `;
        }

        list.appendChild(div);
    });
}

// EVENT
const dateInput = document.getElementById("datePicker");
dateInput.addEventListener("change", function () {
    renderSchedule(this.value);
});

// render lần đầu
renderSchedule();
</script>

</body>
</html>
