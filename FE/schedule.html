<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch trống cố vấn – EduConsult</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(180deg, #eef6ff, #f8fbff); margin: 0; color: #1e3a8a; }
.hero { background: linear-gradient(135deg, #3b82f6, #2563eb 55%, #1d4ed8); color: white; padding: 54px 10% 42px; position: relative; overflow: hidden; }
.hero::before { content:""; position:absolute; border-radius:50%; width:240px; height:240px; background:#93c5fd; top:-70px; right:110px; filter:blur(45px); opacity:0.22; }
.hero::after  { content:""; position:absolute; border-radius:50%; width:200px; height:200px; background:#dbeafe; bottom:-60px; left:8%; filter:blur(45px); opacity:0.22; }
.hero h1 { position:relative; z-index:1; margin:0; font-size:clamp(28px,4vw,44px); font-weight:800; letter-spacing:-0.03em; }
.hero p  { position:relative; z-index:1; margin:10px 0 0; font-size:15px; line-height:1.7; color:#e8f1ff; max-width:700px; }
.page-wrap { width: min(1100px, 84%); margin: -26px auto 52px; position: relative; z-index: 2; }
.filter-bar { background: white; border-radius: 20px; padding: 18px 24px; box-shadow: 0 8px 30px rgba(37,99,235,0.10); border: 1px solid #e6f0ff; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
.filter-bar label { font-size: 13px; font-weight: 700; color: #1e3a8a; white-space: nowrap; }
.filter-bar input[type="date"] { padding: 10px 14px; border-radius: 12px; border: 1.5px solid #dbe7ff; background: #f8fbff; font-family: inherit; font-size: 14px; color: #1e3a8a; outline: none; transition: 0.2s; }
.filter-bar input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.btn-reset { padding: 10px 18px; border-radius: 12px; border: 1.5px solid #dbe7ff; background: #eff6ff; color: #2563eb; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; }
.btn-reset:hover { background: #dbeafe; }
.result-count { margin-left: auto; font-size: 13px; color: #64748b; font-weight: 600; }
.date-group { margin-bottom: 28px; }
.date-label { font-size: 13px; font-weight: 700; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; padding: 6px 14px; background: #eff6ff; border-radius: 10px; display: inline-block; }
.slot-card { background: white; border-radius: 18px; padding: 16px 20px; border: 1px solid #e6f0ff; margin-bottom: 10px; display: grid; grid-template-columns: 52px 1fr auto; gap: 14px; align-items: center; box-shadow: 0 4px 14px rgba(37,99,235,0.06); transition: 0.25s; }
.slot-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,99,235,0.12); }
.advisor-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 3px solid #dbeafe; }
.advisor-name { font-size: 15px; font-weight: 800; color: #1e3a8a; margin-bottom: 3px; }
.advisor-tag  { font-size: 11.5px; font-weight: 600; color: #3b82f6; background: #eff6ff; padding: 2px 10px; border-radius: 20px; display: inline-block; margin-bottom: 6px; }
.slot-time    { font-size: 13px; color: #64748b; }
.slot-time b  { color: #1e3a8a; }
.btn-book { font-family: inherit; font-size: 13px; font-weight: 700; padding: 10px 20px; border-radius: 12px; border: none; background: linear-gradient(90deg, #3b82f6, #2563eb); color: white; cursor: pointer; white-space: nowrap; box-shadow: 0 4px 14px rgba(59,130,246,0.25); transition: 0.2s; text-decoration: none; display: inline-block; }
.btn-book:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(59,130,246,0.35); }
.empty { text-align: center; padding: 52px 20px; background: white; border-radius: 20px; border: 1px solid #e6f0ff; color: #94a3b8; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.loading { text-align: center; padding: 40px; color: #94a3b8; font-size: 15px; }
@media (max-width: 640px) {
    .slot-card { grid-template-columns: 1fr; }
    .page-wrap { width: 92%; }
    .filter-bar { flex-direction: column; align-items: flex-start; }
    .result-count { margin-left: 0; }
}
</style>
</head>
<body>
<div id="site-header"></div>
<section class="hero">
    <h1>Lịch trống cố vấn</h1>
    <p>Xem toàn bộ khung giờ còn trống của các cố vấn và đặt lịch tư vấn ngay.</p>
</section>
<div class="page-wrap">
    <div class="filter-bar">
        <label>Chọn ngày:</label>
        <input type="date" id="datePicker">
        <button class="btn-reset" id="resetBtn">Tất cả ngày</button>
        <span class="result-count" id="resultCount"></span>
    </div>
    <div id="slotContainer">
        <div class="loading">Đang tải lịch trống...</div>
    </div>
</div>
<div id="site-footer"></div>
<script src="components.js"></script>
<script>
let allSlots = [];
const today = new Date().toISOString().split('T')[0];
document.getElementById('datePicker').setAttribute('min', today);

async function loadSlots(date = '') {
    const container = document.getElementById('slotContainer');
    container.innerHTML = '<div class="loading">Đang tải lịch trống...</div>';
    try {
        const url = date ? '../BE/get_all_slots.php?date=' + date : '../BE/get_all_slots.php';
        const res = await fetch(url);
        allSlots  = await res.json();
        renderSlots(allSlots);
    } catch {
        container.innerHTML = '<p style="color:#ef4444;text-align:center">Không thể tải dữ liệu.</p>';
    }
}

function renderSlots(slots) {
    const container = document.getElementById('slotContainer');
    document.getElementById('resultCount').textContent = slots.length + ' khung giờ trống';
    if (slots.length === 0) {
        container.innerHTML = '<div class="empty"><div class="empty-icon"></div><p>Không có khung giờ trống.</p></div>';
        return;
    }
    const grouped = {};
    slots.forEach(s => { if (!grouped[s.date]) grouped[s.date] = []; grouped[s.date].push(s); });
    container.innerHTML = Object.entries(grouped).map(([date, daySlots]) => `
        <div class="date-group">
            <div class="date-label">${daySlots[0].date_label}</div>
            ${daySlots.map(s => `
                <div class="slot-card">
                    <img class="advisor-avatar" src="${s.avatar_url || ''}" alt="${s.full_name}"
                         onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(s.full_name)}&background=dbeafe&color=1d4ed8&size=128&bold=true'">
                    <div>
                        <div class="advisor-name">${s.full_name}</div>
                        <div class="advisor-tag">${s.tag ?? ''}</div>
                        <div class="slot-time"><b>${s.start_time} – ${s.end_time}</b> &nbsp;·&nbsp; ${s.rating}</div>
                    </div>
                    <a href="booking.html?advisor_id=${s.advisor_id}&slot_id=${s.slot_id}" class="btn-book">Đặt lịch →</a>
                </div>
            `).join('')}
        </div>
    `).join('');
}

document.getElementById('datePicker').addEventListener('change', function() { loadSlots(this.value); });
document.getElementById('resetBtn').addEventListener('click', function() { document.getElementById('datePicker').value = ''; loadSlots(); });
document.addEventListener('DOMContentLoaded', loadSlots);
</script>
</body>
</html>
