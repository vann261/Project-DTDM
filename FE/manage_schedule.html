<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý lịch hẹn - EduConsult</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --admin-dark: #0f172a; --admin-sidebar: #1e293b; --accent: #3b82f6;
            --accent-gold: #f59e0b; --sidebar-text: #cbd5e1; --header-height: 70px;
        }
        body { background: #f1f5f9; margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; overflow-x: hidden; }

        /* --- HEADER & SIDEBAR ĐỒNG BỘ --- */
        .admin-header {
            background: var(--admin-dark); height: var(--header-height);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; position: fixed; width: 100%; top: 0; z-index: 1000; box-sizing: border-box;
        }
        .logo { color: white; font-size: 20px; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .admin-badge { background: var(--accent-gold); color: #000; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 800; }
        .header-right { display: flex; align-items: center; gap: 20px; color: white; font-size: 14px; }
        .btn-logout { background: #ef4444; color: white; border: none; padding: 8px 18px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        .container { display: flex; margin-top: var(--header-height); min-height: calc(100vh - var(--header-height)); }

        .sidebar { width: 260px; background: var(--admin-sidebar); color: white; padding: 25px 15px; position: fixed; height: 100%; box-sizing: border-box; }
        .sidebar-label { font-size: 11px; text-transform: uppercase; color: #64748b; letter-spacing: 1.5px; margin: 25px 0 12px 15px; font-weight: 700; }
        .sidebar a { display: flex; align-items: center; padding: 12px 18px; margin-bottom: 4px; border-radius: 10px; color: var(--sidebar-text); text-decoration: none; font-weight: 500; font-size: 14px; transition: 0.2s; gap: 12px; }
        .sidebar a:hover { background: rgba(255,255,255,0.05); color: white; }
        .sidebar a.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

        .main { flex: 1; margin-left: 260px; padding: 40px; box-sizing: border-box; }

        /* --- NỘI DUNG RIÊNG TRANG LỊCH HẸN --- */
        .content-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; padding: 15px; color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px; font-size: 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }

        /* --- BADGES TRẠNG THÁI --- */
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; display: inline-block; }
        .badge-pending { background: #fff7ed; color: #c2410c; border: 1px solid #ffedd5; }
        .badge-confirmed { background: #f0fdf4; color: #15803d; border: 1px solid #dcfce7; }
        .badge-cancelled { background: #fef2f2; color: #b91c1c; border: 1px solid #fee2e2; }

        /* --- BUTTONS --- */
        .btn-action { border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 12px; transition: 0.2s; }
        .btn-confirm { background: #16a34a; color: white; margin-right: 5px; }
        .btn-confirm:hover { background: #15803d; transform: translateY(-1px); }
        .btn-cancel { background: #f1f5f9; color: #64748b; }
        .btn-cancel:hover { background: #e2e8f0; color: #ef4444; }

        .topic-text { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #64748b; font-style: italic; }
    </style>
</head>
<body>

    <header class="admin-header">
        <a href="admin.html" class="logo">🎓 EduConsult <span class="admin-badge">ADMIN PANEL</span></a>
        <div class="header-right">
            <div>Admin <small style="display:block; font-size:10px; opacity:0.7;">Quản trị hệ thống</small></div>
            <button class="btn-logout" onclick="location.href='../BE/logout.php'">Đăng xuất</button>
        </div>
    </header>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-label">Hệ thống</div>
            <a href="admin.html"><span></span> Tổng quan</a>
            <div class="sidebar-label">Quản lý chính</div>
            <a href="manage_schedule.html" class="active"><span></span> Lịch hẹn</a>
            <a href="manage_covan.html"><span></span> Cố vấn</a>
            <a href="students.html"><span></span> Sinh viên</a>
        </div>

        <div class="main">
            <h1 style="margin: 0 0 10px 0; font-size: 24px; font-weight: 800;">Quản lý Lịch hẹn</h1>
            <p style="color: #64748b; margin-bottom: 30px;">Duyệt hoặc hủy các yêu cầu tư vấn từ sinh viên.</p>

            <div class="content-card">
                <table>
                    <thead>
                        <tr>
                            <th>Sinh viên</th>
                            <th>Nội dung</th>
                            <th>Thời gian</th>
                            <th>Cố vấn</th>
                            <th>Trạng thái</th>
                            <th style="text-align: right;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="appointment-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", loadAppointments);

        async function loadAppointments() {
            const tbody = document.getElementById('appointment-table-body');
            try {
                const response = await fetch('../BE/get_all_appointments.php');
                const data = await response.json();

                if (data.error) {
                    tbody.innerHTML = `<tr><td colspan="6" style="color:red; text-align:center; padding: 20px;">Lỗi hệ thống: ${data.error}</td></tr>`;
                    return;
                }

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 40px; color: #64748b;">Hiện chưa có yêu cầu đặt lịch nào.</td></tr>`;
                    return;
                }

                tbody.innerHTML = '';
                data.forEach(app => {
                    let statusClass = 'badge-pending';
                    let statusText = 'Chờ duyệt';
                    
                    if(app.status === 'confirmed') { statusClass = 'badge-confirmed'; statusText = 'Đã xác nhận'; }
                    if(app.status === 'cancelled') { statusClass = 'badge-cancelled'; statusText = 'Đã hủy'; }
                    
                    const dateObj = new Date(app.booking_date);
                    const formattedDate = dateObj.toLocaleDateString('vi-VN');

                    tbody.insertAdjacentHTML('beforeend', `
                        <tr>
                            <td style="font-weight:700; color:var(--admin-dark);">${app.student_name}</td>
                            <td><div class="topic-text" title="${app.topic || ''}">${app.topic || 'Không có chủ đề'}</div></td>
                            <td>
                                <div style="font-weight:600;">${app.booking_time}</div>
                                <div style="font-size:12px; color:#64748b;">${formattedDate}</div>
                            </td>
                            <td>
                                <div style="font-size:13px; font-weight:500;">${app.advisor_name}</div>
                            </td>
                            <td><span class="badge ${statusClass}">${statusText}</span></td>
                            <td style="text-align: right;">
                                ${app.status === 'pending' ? `
                                    <button class="btn-action btn-confirm" onclick="updateStatus(${app.appointment_id}, 'confirmed')">Xác nhận</button>
                                    <button class="btn-action btn-cancel" onclick="updateStatus(${app.appointment_id}, 'cancelled')">Hủy</button>
                                ` : `<span style="color:#cbd5e1; font-size:12px; font-weight:600;">HOÀN TẤT</span>`}
                            </td>
                        </tr>
                    `);
                });
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px;">Lỗi kết nối máy chủ.</td></tr>';
            }
        }

        async function updateStatus(id, newStatus) {
            const actionText = newStatus === 'confirmed' ? 'XÁC NHẬN' : 'HỦY';
            if (!confirm(`Bạn có chắc chắn muốn ${actionText} lịch hẹn này?`)) return;

            try {
                const response = await fetch('../BE/update_appointment_status.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, status: newStatus })
                });
                
                const result = await response.json();
                if (result.success) {
                    loadAppointments(); // Reload table
                } else {
                    alert('Lỗi: ' + result.error);
                }
            } catch (e) {
                alert('Không thể kết nối đến máy chủ.');
            }
        }
    </script>
</body>
</html>
