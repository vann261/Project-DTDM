<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đã đăng xuất - EduConsult</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f1f5f9;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .logout-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }
        h2 { color: #0f172a; margin-bottom: 10px; }
        p { color: #64748b; margin-bottom: 30px; line-height: 1.6; }
        .btn-login {
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 700;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body>

    <div class="logout-card">
        <span class="icon">👋</span>
        <h2>Hẹn gặp lại bạn!</h2>
        <p>Bạn đã đăng xuất thành công khỏi hệ thống quản trị <strong>EduConsult</strong>.</p>
        
        <a href="login.html" class="btn-login">Quay lại Đăng nhập</a>
    </div>

</body>
</html>
